<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AI 문제 해결 실무 강의</title>
  <meta name="description" content="AI 시대, 문제를 정의하고 해결하는 실전 역량 강화 강의교안입니다." />

  <!-- 카카오톡 / 페이스북 / 네이버 공유 썸네일 -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="AI 문제 해결 실무 강의" />
  <meta property="og:description" content="생성형 AI · 피지컬 AI · 휴머노이드 로봇을 실무 문제 해결 관점으로 배우는 강의교안" />
  <meta property="og:image" content="kakao_thumbnail.png" />
  <meta property="og:image:width" content="900" />
  <meta property="og:image:height" content="1600" />
  <meta property="og:url" content="./" />

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans KR","Pretendard","Segoe UI",sans-serif;
      background:#f5f8f4;
      color:#121212;
      min-height:100vh;
      line-height:1.6;
    }
    .wrap{
      max-width:720px;
      margin:0 auto;
      padding:18px;
    }
    .card{
      background:#fff;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 16px 40px rgba(0,0,0,.12);
      border:1px solid #e6efe8;
    }
    .thumb{
      width:100%;
      display:block;
      background:#e8f9ee;
    }
    .content{
      padding:24px 22px 28px;
      text-align:center;
    }
    .badge{
      display:inline-block;
      background:#e8f9ee;
      color:#168a3a;
      border-radius:999px;
      padding:7px 14px;
      font-weight:900;
      font-size:13px;
      margin-bottom:12px;
    }
    h1{
      font-size:clamp(28px,7vw,42px);
      line-height:1.2;
      letter-spacing:-1px;
      margin-bottom:12px;
      font-weight:950;
    }
    .green{color:#1db954}
    p{
      color:#555;
      font-size:16px;
      margin-bottom:20px;
      word-break:keep-all;
    }
    .btn{
      display:block;
      width:100%;
      background:#1db954;
      color:white;
      text-decoration:none;
      font-size:20px;
      font-weight:900;
      padding:18px 20px;
      border-radius:18px;
      box-shadow:0 10px 22px rgba(29,185,84,.28);
    }
    .btn:active{transform:scale(.99)}
    .sub{
      margin-top:14px;
      font-size:13px;
      color:#777;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <img class="thumb" src="kakao_thumbnail.png" alt="AI 문제 해결 실무 강의 썸네일" />

      <div class="content">
        <div class="badge">AI닷 강의교안</div>
        <h1><span class="green">AI 문제 해결</span><br>실무 강의</h1>
        <p>
          생성형 AI, 피지컬 AI, 휴머노이드 로봇을 실무 문제 해결 관점으로 배우는 강의교안입니다.
        </p>

        <a class="btn" href="AI문제해결실무_강의교안.html">
          🚀 AI 문제 해결 실무 강의 바로가기
        </a>

        <div class="sub">
          GitHub Pages에 올린 뒤 이 index.html 주소를 카카오톡에 공유하세요.
        </div>
      </div>
    </section>
  </main>
</body>
</html>
